name: Release Windows updater

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable-x86_64-pc-windows-msvc
      - run: pnpm install --frozen-lockfile
      - run: node scripts/updater-config.test.mjs
      - run: node scripts/updater-cleanup-contract.test.mjs
      - run: node scripts/updater-current-version-fallback.test.mjs
      - run: node scripts/updater-timeout-recovery.test.mjs
      - run: node --test scripts/updater-check-coordinator.test.ts
      - run: node scripts/dashboard-update-action.test.mjs
      - run: node --test scripts/updater-error-message.test.ts
      - run: node --test scripts/updater-state-flow.test.ts
      - run: node scripts/updater-ui-contract.test.mjs
      - run: pnpm build
      - run: cargo test --manifest-path .\src-tauri\Cargo.toml services::updater -- --nocapture
      - run: cargo test --manifest-path .\src-tauri\Cargo.toml prepare_for_update -- --nocapture
      - run: cargo check --manifest-path .\src-tauri\Cargo.toml
      - uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Relay Pool Desktop v__VERSION__
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
