name: Release Windows updater

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable-x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: src-tauri -> target
      - run: pnpm install --frozen-lockfile
      - name: Verify release tag and source version
        env:
          RELAY_POOL_RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/verify-release-version.mjs --require-tag
      - name: Load release notes
        id: release_notes
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $path = "docs/release/v$version.md"
          if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
            throw "missing release notes: $path"
          }
          $body = Get-Content -Raw -LiteralPath $path
          if ([string]::IsNullOrWhiteSpace($body)) {
            throw "release notes are empty: $path"
          }
          $delimiter = "RELEASE_NOTES_$([guid]::NewGuid().ToString('N'))"
          "body<<$delimiter" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          $delimiter >> $env:GITHUB_OUTPUT
      - run: pnpm verify:release
      - uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Relay Pool Desktop ${{ github.ref_name }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
      - name: Scan final release bundle
        run: pnpm verify:release-bundle
